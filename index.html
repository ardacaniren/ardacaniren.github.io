<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody Takip Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2234;
            --border: rgba(255,255,255,0.08);
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --text: #f1f5f9;
            --muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(17,24,39,0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Gerçek InBody logosu — SVG inline */
        .inbody-logo-svg {
            height: 28px;
            width: auto;
        }

        .logo-divider {
            width: 1px;
            height: 22px;
            background: rgba(255,255,255,0.15);
        }

        .logo-sub {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.02em;
        }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 500; color: #10b981;
            letter-spacing: 0.05em;
        }

        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #10b981;
            animation: blink 1.5s ease infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        main {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .featured-wrap { width: 100%; }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
        .section-label.muted { color: var(--muted); }

        .featured-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .featured-img-wrap {
            position: relative;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
        }

        #featured-img {
            width: 100%;
            height: auto;
            display: none;
        }

        .zoom-hint {
            position: absolute;
            bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.65);
            pointer-events: none;
            display: none;
        }

        .featured-footer {
            padding: 0.85rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .featured-date { font-size: 0.8rem; color: var(--muted); }
        .featured-date span { color: var(--text); font-weight: 500; }

        .btn-refresh {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent); color: white;
            border: none; padding: 7px 16px; border-radius: 8px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }
        .btn-refresh:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-refresh.spinning svg { animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* States */
        .loader-wrap {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .loader-text { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }

        .error-wrap {
            display: none; flex-direction: column;
            align-items: center; gap: 10px;
            padding: 3rem; text-align: center;
            position: absolute; inset: 0; justify-content: center;
        }
        .error-wrap .eicon { font-size: 2rem; }
        .error-wrap .etitle { font-weight: 600; font-size: 1rem; }
        .error-wrap .edesc { font-size: 0.8rem; color: var(--muted); max-width: 320px; line-height: 1.6; }
        .error-wrap code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; color: var(--accent2); }

        /* Carousel */
        .carousel-section { width: 100%; }

        .carousel {
            display: flex; gap: 12px;
            overflow-x: auto; padding-bottom: 8px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }
        .carousel::-webkit-scrollbar { height: 4px; }
        .carousel::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

        .thumb {
            flex-shrink: 0; width: 160px;
            scroll-snap-align: start;
            border-radius: 10px; overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer; transition: all 0.2s;
            background: var(--surface);
        }
        .thumb:hover { border-color: var(--accent); transform: translateY(-2px); }
        .thumb.active { border-color: var(--accent2); }
        .thumb img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .thumb-label {
            padding: 6px 8px; font-size: 0.68rem;
            color: var(--muted); background: var(--surface2); text-align: center;
        }
        .thumb.active .thumb-label { color: var(--accent2); }

        .skeleton { flex-shrink:0; width:160px; border-radius:10px; overflow:hidden; background:var(--surface); }
        .skel-img { width:100%; height:110px; background: linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; }
        .skel-lbl { height:28px; background: linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.93); z-index: 1000;
            align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox-img-wrap {
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            max-width: 95vw; max-height: 95vh;
        }
        .lightbox img {
            max-width: 95vw; max-height: 90vh;
            object-fit: contain; border-radius: 8px;
            cursor: default;
            transition: transform 0.2s ease;
            transform-origin: center center;
        }
        .lightbox-close {
            position: absolute; top: 16px; right: 20px;
            font-size: 1.8rem; color: rgba(255,255,255,0.5);
            cursor: pointer; transition: color 0.15s; line-height: 1;
            z-index: 10;
        }
        .lightbox-close:hover { color: white; }
        .zoom-controls {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center;
        }
        .zoom-btn {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: white; font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .zoom-btn:hover { background: rgba(255,255,255,0.2); }
        .zoom-level { font-size: 0.75rem; color: rgba(255,255,255,0.5); min-width: 40px; text-align: center; }

        @media (max-width: 600px) {
            main { padding: 1rem; }
            header { padding: 0.75rem 1rem; }
        }

        /* LOGIN */
        .login-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #0a0f1e;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: #111827;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%; max-width: 360px;
            display: flex; flex-direction: column; gap: 1.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .login-header { text-align: center; display: flex; flex-direction: column; gap: 8px; }
        .login-logo { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; }
        .login-title { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
        .login-sub { font-size: 0.78rem; color: #64748b; }
        .login-fields { display: flex; flex-direction: column; gap: 0.75rem; }
        .login-field { display: flex; flex-direction: column; gap: 5px; }
        .login-field label { font-size: 0.72rem; font-weight: 500; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }
        .login-field input {
            background: #1a2234; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 10px 14px;
            color: #f1f5f9; font-size: 0.9rem; font-family: 'Inter', sans-serif;
            outline: none; transition: border-color 0.15s;
        }
        .login-field input:focus { border-color: #3b82f6; }
        .login-field input.shake { animation: shake 0.35s ease; border-color: #9B1C1C; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-5px)}
            80%{transform:translateX(5px)}
        }
        .login-btn {
            background: #3b82f6; color: white; border: none;
            border-radius: 10px; padding: 11px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.15s;
        }
        .login-btn:hover { background: #2563eb; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .login-error {
            font-size: 0.78rem; color: #9B1C1C; text-align: center;
            background: rgba(155,28,28,0.15); border: 1px solid rgba(155,28,28,0.3);
            border-radius: 8px; padding: 8px; display: none;
        }
    </style>
</head>
<body>


<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:32px;width:auto">
                    <text x="0" y="46" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="#800020">InBody</text>
                </svg>
            </div>
            <div class="login-title">Yönetici Girişi</div>
            <div class="login-sub">Takip paneline erişmek için giriş yapın</div>
        </div>
        <div class="login-fields">
            <div class="login-field">
                <label>Kullanıcı Adı</label>
                <input type="text" id="login-user" placeholder="Kullanıcı adı" autocomplete="username">
            </div>
            <div class="login-field">
                <label>Şifre</label>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
            </div>
        </div>
        <div class="login-error" id="login-error">❌ Kullanıcı adı veya şifre hatalı</div>
        <button class="login-btn" onclick="loginCheck()">Giriş Yap</button>
    </div>
</div>

<header>
    <div class="logo">
        <!-- InBody resmi logosu (SVG inline) -->
        <svg class="inbody-logo-svg" viewBox="0 0 260 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- "In" kırmızı -->
            <text x="0" y="46" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="#800020">In</text>
            <!-- "Body" siyah/beyaz -->
            <text x="52" y="46" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="#800020">Body</text>
        </svg>
        <div class="logo-divider"></div>
        <span class="logo-sub">Takip Paneli</span>
    </div>
    <div class="live-badge">
        <span class="live-dot"></span>
        CANLI
    </div>
</header>

<main>
    <div class="featured-wrap">
        <div class="section-label">Son Ölçüm</div>
        <div class="featured-card">
            <div class="featured-img-wrap" id="featured-wrap" onclick="featuredClick()">
                <div class="loader-wrap" id="main-loader">
                    <div class="spinner"></div>
                    <div class="loader-text">YÜKLENIYOR...</div>
                </div>
                <div class="error-wrap" id="main-error">
                    <div class="eicon">⚠️</div>
                    <div class="etitle">Rapor yüklenemedi</div>
                    <div class="edesc" id="error-text">Bir hata oluştu.</div>
                </div>
                <img id="featured-img" src="" alt="InBody Raporu">
                <div class="zoom-hint" id="zoom-hint">🔍 Büyütmek için tıkla</div>
            </div>
            <div class="featured-footer">
                <div class="featured-date">Son güncelleme: <span id="update-time">—</span></div>
                <button class="btn-refresh" id="btn-refresh" onclick="veriGetir(); event.stopPropagation();">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Yenile
                </button>
            </div>
        </div>
    </div>

    <div class="carousel-section">
        <div class="section-label muted">Geçmiş Ölçümler</div>
        <div class="carousel" id="carousel">
            <div class="skeleton"><div class="skel-img"></div><div class="skel-lbl"></div></div>
            <div class="skeleton"><div class="skel-img"></div><div class="skel-lbl"></div></div>
            <div class="skeleton"><div class="skel-img"></div><div class="skel-lbl"></div></div>
        </div>
    </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <div class="lightbox-img-wrap">
        <img id="lightbox-img" src="" alt="Büyük görünüm">
    </div>
    <div class="zoom-controls" onclick="event.stopPropagation()">
        <button class="zoom-btn" onclick="zoomLightbox(-0.25)">−</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" onclick="zoomLightbox(0.25)">+</button>
    </div>
</div>

<script>

    // ── LOGIN ────────────────────────────────────────────────────────────────
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = '0000';

    function loginCheck() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const errEl = document.getElementById('login-error');

        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            document.getElementById('login-overlay').style.display = 'none';
            veriGetir();
        } else {
            errEl.style.display = 'block';
            ['login-user','login-pass'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('shake');
                void el.offsetWidth; // reflow
                el.classList.add('shake');
            });
        }
    }

    // Enter tuşuyla giriş
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.getElementById('login-overlay').style.display !== 'none') {
            loginCheck();
        }
    });


    const SHEET_ID = '11DTz5vnxgaTcYl3yTDRUW6PyOrXhnXWOgBovZxMVicY';
    const JSON_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=Sheet1';

    let imageLinks = [];
    let currentIndex = 0;
    let lbScale = 1;

    function getThumbUrl(fileId) {
        return "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w320&_=" + Date.now();
    }
    function getFeaturedUrl(fileId) {
        return "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w1200&_=" + Date.now();
    }
    function getLightboxUrl(fileId) {
        return "https://drive.google.com/thumbnail?id=" + fileId + "&sz=w2000&_=" + Date.now();
    }

    function extractFileId(url) {
        var idParam = url.split('id=')[1];
        if (idParam) return idParam.split('&')[0].split('"')[0].trim();
        var dParam = url.split('/d/')[1];
        if (dParam) return dParam.split('/')[0].split('?')[0].split('"')[0].trim();
        return null;
    }

    async function veriGetir() {
        const btn = document.getElementById('btn-refresh');
        btn.classList.add('spinning');
        btn.disabled = true;
        showState('loading');

        try {
            const res = await fetch(JSON_URL + '&_=' + Date.now());
            if (!res.ok) throw new Error('Veri alınamadı (HTTP ' + res.status + ')');
            const raw = await res.text();

            console.log('Ham yanıt:', raw.slice(0, 300));

            // Google wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
            const jsonStr = raw.slice(raw.indexOf('{'), raw.lastIndexOf('}') + 1);
            const json = JSON.parse(jsonStr);

            const rows = json.table.rows;
            const ids = [];

            for (const row of rows) {
                if (!row.c || !row.c[0] || !row.c[0].v) continue;
                const url = row.c[0].v.toString().trim();
                if (!url.includes('drive.google.com')) continue;
                const id = extractFileId(url);
                if (id && !ids.includes(id)) ids.push(id);
            }

            console.log('Bulunan ID sayısı:', ids.length, ids);

            if (ids.length === 0) {
                throw new Error('Sheets te Drive linki bulunamadi. AppScript i calistir.');
            }

            imageLinks = ids;
            currentIndex = 0;
            loadFeatured(0);
            buildCarousel();
            document.getElementById('update-time').textContent =
                new Date().toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });

        } catch(e) {
            console.error(e);
            document.getElementById('error-text').innerHTML =
                e.message + '<br><br>Console\'u (F12) kontrol et.';
            showState('error');
        } finally {
            btn.classList.remove('spinning');
            btn.disabled = false;
        }
    }

    function loadFeatured(index) {
        currentIndex = index;
        showState('loading');
        const img = document.getElementById('featured-img');
        const url = getFeaturedUrl(imageLinks[index]);
        img.onload = () => showState('image');
        img.onerror = () => {
            document.getElementById('error-text').innerHTML =
                'Resim yüklenemedi.<br>Drive paylaşım iznini kontrol et.';
            showState('error');
        };
        img.src = url;
        document.querySelectorAll('.thumb').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });
    }

    function buildCarousel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = '';
        imageLinks.forEach((id, i) => {
            const thumb = document.createElement('div');
            thumb.className = 'thumb' + (i === 0 ? ' active' : '');
            thumb.onclick = () => loadFeatured(i);

            const img = document.createElement('img');
            img.src = getThumbUrl(id);
            img.alt = 'Ölçüm ' + (i + 1);
            img.loading = 'lazy';

            const lbl = document.createElement('div');
            lbl.className = 'thumb-label';
            lbl.textContent = i === 0 ? 'Son Ölçüm' : (i === 1 ? 'Önceki' : '-' + i + '. ölçüm');

            thumb.appendChild(img);
            thumb.appendChild(lbl);
            carousel.appendChild(thumb);
        });
    }

    function showState(state) {
        document.getElementById('main-loader').style.display  = state === 'loading' ? 'flex'  : 'none';
        document.getElementById('main-error').style.display   = state === 'error'   ? 'flex'  : 'none';
        document.getElementById('featured-img').style.display = state === 'image'   ? 'block' : 'none';
        document.getElementById('zoom-hint').style.display    = state === 'image'   ? 'block' : 'none';
    }

    function featuredClick() {
        if (imageLinks.length > 0 && document.getElementById('featured-img').style.display !== 'none') {
            openLightbox(currentIndex);
        }
    }

    function openLightbox(index) {
        lbScale = 1;
        const lbImg = document.getElementById('lightbox-img');
        lbImg.style.transform = 'scale(1)';
        lbImg.src = getLightboxUrl(imageLinks[index]);
        document.getElementById('lightbox').classList.add('open');
        document.getElementById('zoom-level').textContent = '100%';
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
        if (e && e.target !== document.getElementById('lightbox') &&
            !e.target.classList.contains('lightbox-close')) return;
        document.getElementById('lightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    function zoomLightbox(delta) {
        lbScale = Math.min(4, Math.max(0.4, lbScale + delta));
        document.getElementById('lightbox-img').style.transform = 'scale(' + lbScale + ')';
        document.getElementById('zoom-level').textContent = Math.round(lbScale * 100) + '%';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
        if (e.key === '+' || e.key === '=') zoomLightbox(0.25);
        if (e.key === '-') zoomLightbox(-0.25);
    });

    // veriGetir login sonrası çağrılır
</script>
</body>
</html>
