<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody Takip Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0f1e;
            --surface: #111827;
            --surface2: #1a2234;
            --border: rgba(255,255,255,0.08);
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --text: #f1f5f9;
            --muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(17,24,39,0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }

        .live-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 500; color: #10b981;
            letter-spacing: 0.05em;
        }

        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #10b981;
            animation: blink 1.5s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* MAIN */
        main {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* FEATURED (büyük resim) */
        .featured-wrap {
            width: 100%;
            position: relative;
        }

        .featured-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .featured-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .featured-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .featured-img-wrap {
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
        }

        #featured-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.2s ease;
        }

        /* Zoom overlay */
        .zoom-hint {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 5px;
            pointer-events: none;
        }

        .featured-footer {
            padding: 0.85rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2);
        }

        .featured-date {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .featured-date span {
            color: var(--text);
            font-weight: 500;
        }

        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.15s;
        }

        .btn-refresh:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-refresh:active { transform: translateY(0); }
        .btn-refresh.spinning svg { animation: spin 0.7s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* LOADER */
        .loader-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--surface);
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .loader-text {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.08em;
        }

        /* ERROR */
        .error-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 3rem;
            text-align: center;
        }

        .error-wrap .icon { font-size: 2rem; }
        .error-wrap .title { font-weight: 600; }
        .error-wrap .desc { font-size: 0.82rem; color: var(--muted); }

        /* CAROUSEL (küçük resimler) */
        .carousel-section {
            width: 100%;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .carousel {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }

        .carousel::-webkit-scrollbar { height: 4px; }
        .carousel::-webkit-scrollbar-track { background: transparent; }
        .carousel::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

        .thumb {
            flex-shrink: 0;
            width: 160px;
            scroll-snap-align: start;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface);
            position: relative;
        }

        .thumb:hover { border-color: var(--accent); transform: translateY(-2px); }
        .thumb.active { border-color: var(--accent2); }

        .thumb img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            display: block;
        }

        .thumb-label {
            padding: 6px 8px;
            font-size: 0.68rem;
            color: var(--muted);
            background: var(--surface2);
            text-align: center;
        }

        .thumb.active .thumb-label {
            color: var(--accent2);
        }

        .thumb-skeleton {
            width: 160px;
            flex-shrink: 0;
            border-radius: 10px;
            overflow: hidden;
            background: var(--surface);
        }

        .skeleton-img {
            width: 100%;
            height: 110px;
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }

        .skeleton-label {
            height: 28px;
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* LIGHTBOX (zoom) */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            cursor: default;
        }

        .lightbox-close {
            position: absolute;
            top: 16px; right: 20px;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            line-height: 1;
            transition: color 0.15s;
        }

        .lightbox-close:hover { color: white; }

        /* Zoom controls on lightbox */
        .zoom-controls {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .zoom-btn {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }

        .zoom-btn:hover { background: rgba(255,255,255,0.2); }

        @media (max-width: 600px) {
            main { padding: 1rem; }
            header { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">📊</div>
        InBody Takip
    </div>
    <div class="live-badge">
        <span class="live-dot"></span>
        CANLI
    </div>
</header>

<main>
    <!-- Büyük (featured) resim -->
    <div class="featured-wrap">
        <div class="featured-label">Son Ölçüm</div>
        <div class="featured-card">
            <div class="featured-img-wrap" id="featured-wrap" onclick="openLightbox(currentIndex)">
                <div class="loader-wrap" id="main-loader">
                    <div class="spinner"></div>
                    <div class="loader-text">YÜKLENIYOR...</div>
                </div>
                <div class="error-wrap" id="main-error">
                    <div class="icon">⚠️</div>
                    <div class="title">Rapor yüklenemedi</div>
                    <div class="desc" id="error-text">Bir hata oluştu.</div>
                </div>
                <img id="featured-img" src="" alt="InBody Raporu" style="display:none">
                <div class="zoom-hint">🔍 Büyütmek için tıkla</div>
            </div>
            <div class="featured-footer">
                <div class="featured-date">Güncelleme: <span id="update-time">—</span></div>
                <button class="btn-refresh" id="btn-refresh" onclick="veriGetir()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    Yenile
                </button>
            </div>
        </div>
    </div>

    <!-- Küçük carousel -->
    <div class="carousel-section">
        <div class="section-label">Geçmiş Ölçümler</div>
        <div class="carousel" id="carousel">
            <!-- Skeleton -->
            <div class="thumb-skeleton"><div class="skeleton-img"></div><div class="skeleton-label"></div></div>
            <div class="thumb-skeleton"><div class="skeleton-img"></div><div class="skeleton-label"></div></div>
            <div class="thumb-skeleton"><div class="skeleton-img"></div><div class="skeleton-label"></div></div>
        </div>
    </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <span class="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="Büyük görünüm">
    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomLightbox(-0.2); event.stopPropagation()">−</button>
        <button class="zoom-btn" onclick="zoomLightbox(0.2); event.stopPropagation()">+</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbbOIMxUizeJw4siM8hubz7vILGnh-rBpR5I1NSiDpf2sU3QEWjCjHVkI-ATIpsru0dZeIIBSoN5Ls/pub?output=csv';

    let imageLinks = [];
    let currentIndex = 0;
    let lightboxScale = 1;

    // ── CSV'den linkleri oku ─────────────────────────────────────────────────
    async function veriGetir() {
        const btn = document.getElementById('btn-refresh');
        btn.classList.add('spinning');
        btn.disabled = true;

        showMainState('loading');

        try {
            const res = await fetch(CSV_URL + '&_=' + Date.now());
            if (!res.ok) throw new Error('CSV çekilemedi');
            const raw = await res.text();

            // Her satırdan link çıkar
            const rows = raw.split('\n').map(r => r.trim()).filter(Boolean);
            const links = [];

            for (const row of rows) {
                const match = row.match(/https?:\/\/[^\s",\r\n]+drive\.google\.com[^\s",\r\n]*/i);
                if (match) {
                    const url = match[0].replace(/["\s]+$/, '');
                    // file id çıkar
                    const idM = url.match(/[?&]id=([\w-]+)/) || url.match(/\/d\/([\w-]+)/);
                    if (idM) {
                        links.push("https://drive.google.com/thumbnail?id=" + idM[1] + "&sz=w1200");
                    }
                }
            }

            if (links.length === 0) throw new Error('Hiç resim linki bulunamadı');

            imageLinks = links;
            currentIndex = 0;

            // Büyük resmi yükle
            loadFeatured(0);

            // Carousel'i doldur
            buildCarousel();

            document.getElementById('update-time').textContent =
                new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

        } catch (e) {
            console.error(e);
            document.getElementById('error-text').textContent = e.message;
            showMainState('error');
        } finally {
            btn.classList.remove('spinning');
            btn.disabled = false;
        }
    }

    // ── Büyük resmi yükle ────────────────────────────────────────────────────
    function loadFeatured(index) {
        currentIndex = index;
        showMainState('loading');

        const url = imageLinks[index] + '&_=' + Date.now();
        const img = document.getElementById('featured-img');

        img.onload = () => showMainState('image');
        img.onerror = () => {
            document.getElementById('error-text').textContent = 'Resim yüklenemedi. Drive erişimini kontrol edin.';
            showMainState('error');
        };
        img.src = url;

        // Carousel aktif item güncelle
        document.querySelectorAll('.thumb').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });
    }

    // ── Carousel oluştur ─────────────────────────────────────────────────────
    function buildCarousel() {
        const carousel = document.getElementById('carousel');
        carousel.innerHTML = '';

        imageLinks.forEach((link, i) => {
            const thumb = document.createElement('div');
            thumb.className = 'thumb' + (i === 0 ? ' active' : '');
            thumb.onclick = () => loadFeatured(i);

            const img = document.createElement('img');
            // Thumbnail için küçük boyut
            const idM = link.match(/id=([\w-]+)/);
            img.src = idM
                ? "https://drive.google.com/thumbnail?id=" + idM[1] + "&sz=w320&_=" + Date.now()
                : link;
            img.alt = "Ölçüm " + (i + 1);

            const label = document.createElement('div');
            label.className = 'thumb-label';
            label.textContent = i === 0 ? 'Son Ölçüm' : 'Ölçüm -' + i;

            thumb.appendChild(img);
            thumb.appendChild(label);
            carousel.appendChild(thumb);
        });
    }

    // ── State yönetimi ───────────────────────────────────────────────────────
    function showMainState(state) {
        document.getElementById('main-loader').style.display  = state === 'loading' ? 'flex'  : 'none';
        document.getElementById('main-error').style.display   = state === 'error'   ? 'flex'  : 'none';
        document.getElementById('featured-img').style.display = state === 'image'   ? 'block' : 'none';
    }

    // ── Lightbox ─────────────────────────────────────────────────────────────
    function openLightbox(index) {
        const idM = imageLinks[index].match(/id=([\w-]+)/);
        const url = idM
            ? "https://drive.google.com/thumbnail?id=" + idM[1] + "&sz=w2000&_=" + Date.now()
            : imageLinks[index];

        lightboxScale = 1;
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        lbImg.style.transform = 'scale(1)';
        lbImg.src = url;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox(e) {
        if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
        if (!e) {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        } else {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
    }

    function zoomLightbox(delta) {
        lightboxScale = Math.min(3, Math.max(0.5, lightboxScale + delta));
        document.getElementById('lightbox-img').style.transform = 'scale(' + lightboxScale + ')';
    }

    // ESC tuşuyla kapat
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
    });

    // Başlat
    veriGetir();
</script>
</body>
</html>
